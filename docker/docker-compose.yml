version: '3.9'

# ══════════════════════════════════════════════════════════════
#  RAPPICAMPO — docker-compose.yml
#  Stack: React 19 · Node 22 · PostgreSQL 17 · MongoDB 8
# ══════════════════════════════════════════════════════════════

services:

  # ── Nginx: frontend compilado + proxy al backend ────────────
  nginx:
    image: nginx:alpine
    container_name: rappicampo_nginx
    ports:
      - "80:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rappicampo_net

  # ── Backend Node.js 22 LTS ──────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: rappicampo_backend
    ports:
      - "4000:4000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - rappicampo_net

  # ── PostgreSQL 17 ────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: rappicampo_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rappicampo_net

  # ── MongoDB 8 ─────────────────────────────────────────────────
  mongodb:
    image: mongo:8.0
    container_name: rappicampo_mongodb
    volumes:
      - mongo_data:/data/db
      - /backups:/backups
    ports:
      - "27017:27017"
    restart: unless-stopped
    networks:
      - rappicampo_net

  # ── Redis (Socket.IO rooms + caché ETA) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: rappicampo_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - rappicampo_net

volumes:
  postgres_data:
  mongo_data:

networks:
  rappicampo_net:
    driver: bridge
